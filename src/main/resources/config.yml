# Rayon de recherche des blocs de support / blocs instables (en blocs)
support-radius: 5

# Rayon vertical vers le HAUT dans lequel un bloc
# 0 = désactivé
top-support-radius: 2

# Blocs considérés comme "flottants" :
# ils peuvent reposer sur l'eau comme si c'était un support solide.
floating-support-blocks: 
  - lily_pad
  - seagrass
  - tall_seagrass
  - birch_leaves
  - dark_oak_leaves
  - jungle_leaves
  - oak_leaves
  - spruce_leaves
  - mangrove_leaves
  - cherry_leaves
  - acacia_log
  - birch_log
  - dark_oak_log
  - jungle_log
  - oak_log
  - spruce_log
  - mangrove_log
  - cherry_log

fall-delay-minutes: 0.1
# Couleurs des particules d'instabilité (dans l'ordre : début, milieu, fin)
instability-colors:
  - yellow
  - orange
  - red

