debug: true


support-radius: 32 # radius for checking if a block is supported by other blocks (not air) in horizontal directions
top-support-radius: 16 # radius for checking if a block is supported by other blocks (not air) in up direction

anchor-support-radius-check-when-breaking: 4 # radius for checking if a block is supported by an anchor block (not air) avoid floating structures (2 is the minimum to keep a logical behavior)
anchor-support-radius: 64 # distance for checking if a block is supported by an anchor block (not air) 
anchor-max-time-ms: 5 # max time allowed for hasAnchor search. If exceeded, BridgeFalls considers the block as anchored.

fall-delay-minutes: 15 # 0 to instant fall (minutes)
time-to-check: 20 # delay between placing a block and checking its stability for the first time, also used as interval for repeated checks until it falls (ticks)
time-to-check-anchor: 200 # interval between hasAnchor checks for unstable blocks (ticks)
recheck-queue-max-size: 4096 # maximum number of queued stability rechecks during mass block updates
recheck-drain-batch-size: 8 # number of rechecks processed each global drain cycle

# Gamemodes where BridgeFalls stability checks are disabled
disabled-gamemodes:
  - creative
  - spectator

# Instability particle colors (order: start, middle, end)
instability-colors:
  - yellow
  - orange
  - red

# instability particule when it start to be instable or when falling blocks are disabled
instable-color:
  - blue

allow-placing-unstable-blocks: true # Allow players to place blocks that are not currently supported. If false, the plugin will prevent placing blocks that would be unstable.

# Behavior of falling blocks (FallingBlock) created by the plugin
falling-block: false
falling-block-disable-during-siege: false # If true, falling blocks are temporarily disabled during active SiegeWar battle session.
falling-block-drop-item: true
falling-block-hurt-entities: true

# Blocks that are considered as "no rest" blocks in vertical support checks
no-rest-blocks-vertical:
  - lava
  - water
  - fire

# Blocks that are considered as "no rest" blocks in horizontal support checks
no-rest-blocks-horizontal:
  - lava
  - water
  - fire
  - powder_snow
  - scaffolding
