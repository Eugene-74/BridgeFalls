# Rayon de recherche des blocs de support / blocs instables (en blocs)
support-radius: 5

# Rayon vertical vers le HAUT dans lequel un bloc
# 0 = désactivé
top-support-radius: 2

# Blocs considérés comme "flottants" :
# ils peuvent reposer sur l'eau comme si c'était un support solide.
floating-support-blocks: 
  - lily_pad
  - seagrass
  - tall_seagrass
  - birch_leaves
  - dark_oak_leaves
  - jungle_leaves
  - oak_leaves
  - spruce_leaves
  - mangrove_leaves
  - cherry_leaves
  - acacia_log
  - birch_log
  - dark_oak_log
  - jungle_log
  - oak_log
  - spruce_log
  - mangrove_log
  - cherry_log

fall-delay-minutes: 0.1

# Couleurs des particules d'instabilité (dans l'ordre : début, milieu, fin)
instability-colors:
  - yellow
  - orange
  - red

# Si true, on peut poser des blocs sans support :
#   - ils seront marqués comme instables
#   - ils pourront ensuite tomber selon la logique du plugin
# Si false, la pose d'un bloc instable est annulée.
allow-placing-unstable-blocks: true

# Comportement des blocs qui tombent (FallingBlock) créés par le plugin
falling-block-drop-item: false
falling-block-hurt-entities: true

# Active / désactive temporairement la chute des blocs instables.
# Quand remis sur true, tous les timers de chute repartent de zéro.
falling-enabled: true

