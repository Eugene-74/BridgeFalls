messages:
  block.always-stable-placed: "[GREEN] Block marked as always stable (always-stable-blocks list in config) placed without structure check."
  block.height-ok: "[GREEN] Block height: {height}"
  block.place.error.header: "Cannot place {block} at {x}, {y}, {z}: "
  block.place.error.no-below: "no block below (void) to support this block."
  block.place.error.below-no-support: "the block below ({below}) is in the no-rest-blocks-vertical list in the config and cannot serve as vertical support."
  block.place.error.below-invalid: "the block below ({below}) does not provide valid support with the current settings."
  block.place.error.no-anchor: " no anchor support found within {radius} blocks."
  block.place.error.no-horizontal: "No structural block is connected within {radius} blocks horizontally (current support-radius) to support this block."
  block.place.error.weak-horizontal: "The horizontally connected blocks around are not themselves properly supported vertically."
  break.made-unstable: "[RED] You made {count} block{plural} unstable within a radius of {radius} blocks (current support-radius)."

  block.place.info.block: "[YELLOW] Placed block: {block}. (support-radius={supportRadius}, top-support-radius={topSupportRadius})"
  block.place.info.direct: "[YELLOW] Direct vertical support under the block: {direct}."
  block.place.info.horizontal: "[YELLOW] Horizontal support within a radius of {supportRadius} blocks: {horizontal}."
  block.place.info.top: "[YELLOW] Support from above within a vertical radius of {topSupportRadius} blocks: {top}."

  block.place.marked-unstable: "[YELLOW] No support found: {block} is placed but marked as unstable (allow-placing-unstable-blocks=true, fall in ~{minutes} minute(s))."

  command.reload: "[GREEN] Configuration reloaded."
  command.enable: "[GREEN] BridgeFalls is now enabled."
  command.disable: "[RED] BridgeFalls is now disabled."

  command.list-nonstruct.vertical: "[YELLOW] NON-structural blocks vertically (no-rest-blocks-vertical): {list}"
  command.list-nonstruct.horizontal: "[YELLOW] NON-structural blocks horizontally (no-rest-blocks-horizontal): {list}"

  command.list-struct.vertical-info: "[GREEN] Blocks providing vertical structure: Any SOLID block that is not in no-rest-blocks-vertical and is not air."
  command.list-struct.horizontal-info: "[GREEN] Blocks providing horizontal structure: Any SOLID block that is not in no-rest-blocks-horizontal and is not air."
  command.list-struct.nonstruct-vertical: "[GRAY] Blocks explicitly non-structural vertically: {list}"
  command.list-struct.nonstruct-horizontal: "[GRAY] Blocks explicitly non-structural horizontally: {list}"

  command.config.boolean-updated: "[GREEN] Option {key} is now {value}."
  command.config.boolean-invalid: "[RED] Invalid value for {key}. Use true, false or nothing to toggle."
  command.config.number-updated: "[GREEN] Option {key} is now {value}."
  command.config.number-invalid: "[RED] Invalid numeric value for {key}: {value}. Minimum is {min}."

  command.config.material-invalid: "[RED] Unknown material: {value}."
  command.config.color-invalid: "[RED] Invalid color: {value}."

  command.config.list-added: "[GREEN] Added {value} to list {key}."
  command.config.list-already: "[YELLOW] {value} is already in list {key}."
  command.config.list-removed: "[GREEN] Removed {value} from list {key}."
  command.config.list-not-found: "[RED] {value} is not in list {key}."
  command.config.list-current: "[YELLOW] List {key}: {list}"
